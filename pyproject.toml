# pyproject.toml — tool configuration only (no build backend; flat layout, no install step)

# ---------------------------------------------------------------------------
# mypy — strict mode; orekit and its Java packages have no type stubs
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
# orekit_jpype and all Java packages surface as untyped Any.
module = ["orekit_jpype", "orekit_jpype.*", "org.*", "com.*", "java.*", "javax.*"]
ignore_missing_imports = true
ignore_errors = true

# ---------------------------------------------------------------------------
# ruff
# ---------------------------------------------------------------------------
[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "W",   # pycodestyle warnings
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "ANN", # flake8-annotations (enforce type hints on our own code)
]
ignore = [
    "E402",   # module-level import not at top of file — unavoidable with Orekit's
              # JVM-init-before-import pattern (initVM() must precede org.orekit imports)
    "I001",   # import block un-sorted — org.orekit (third-party) must follow the
              # first-party puffsat_sim.propagator import that starts the JVM; isort
              # cannot express this ordering constraint
    "ANN401", # typing.Any disallowed — necessary at the JVM/Python boundary where
              # Orekit objects have no type stubs
]

# ---------------------------------------------------------------------------
# pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: requires a live Orekit JVM and orekit-data.zip in the cwd (run with 'make test-integration')",
]
